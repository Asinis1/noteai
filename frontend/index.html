<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Akıllı Not Sistemi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #c8a96e;
      --accent2: #7c6ef7;
      --text: #e8e6df;
      --muted: #888898;
      --danger: #e05c5c;
      --success: #5ccc8f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    
    #auth-screen {
      display: flex; align-items: center; justify-content: center; flex: 1;
      background: radial-gradient(ellipse at 30% 40%, #1a1624 0%, #0f0f11 70%);
    }
    .auth-box {
      zoom:1.5;
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; width: 380px;
    }
    .auth-box h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--accent); margin-bottom: 6px; }
    .auth-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
    .auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg); border-radius: 8px; padding: 4px; }
    .auth-tabs button { flex: 1; padding: 8px; border: none; background: transparent; color: var(--muted); border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .auth-tabs button.active { background: var(--accent); color: #000; font-weight: 500; }

    input, textarea { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; transition: border 0.2s; }
    input:focus, textarea:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-ai { background: linear-gradient(135deg, #7c6ef7, #c8a96e); color: #fff; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 10px; text-align: center; }

    
    #app-screen { display: none; flex: 1; overflow: hidden; flex-direction: column; }

    header {
      zoom:1.5;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 0.82rem; color: var(--muted); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
    .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

    .app-body { display: flex; flex: 1; overflow: hidden; }

    
    aside {
      zoom:1.35;
      width: 240px; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 16px 12px; gap: 8px; overflow-y: auto;
    }
    .sidebar-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; }
    .sidebar-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.88rem; color: var(--muted); transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
    .sidebar-item:hover { background: var(--surface2); color: var(--text); }
    .sidebar-item.active { background: var(--surface2); color: var(--accent); }
    .sidebar-item .icon { font-size: 1rem; width: 18px; text-align: center; }
    .add-note-btn { width: 100%; padding: 10px; background: var(--accent); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.88rem; margin-bottom: 8px; transition: filter 0.2s; }
    .add-note-btn:hover { filter: brightness(1.1); }

    
    .notes-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; zoom:1.35; }
    .notes-toolbar { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
    .search-input { flex: 1; padding: 9px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.88rem; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .notes-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .note-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; transition: all 0.15s;
    }
    .note-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .note-card.active { border-color: var(--accent); background: var(--surface2); }
    .note-card-title { font-weight: 500; font-size: 0.95rem; margin-bottom: 4px; }
    .note-card-preview { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
    .tag-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; font-size: 0.72rem; color: var(--muted); }
    .folder-pill { background: transparent; border: 1px solid var(--accent); border-radius: 20px; padding: 2px 8px; font-size: 0.72rem; color: var(--accent); }
    .date-text { font-size: 0.72rem; color: var(--muted); margin-left: auto; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 8px; }
    .empty-state .big-icon { font-size: 3rem; opacity: 0.3; }

    
    .note-detail {
      zoom:1.5;
      width: 460px; border-left: 1px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .detail-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;}
    .detail-header h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
    .detail-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 7px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    .icon-btn:hover { color: var(--text); border-color: var(--text); }
    
    .close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      width: 32px; height: 32px; border-radius: 7px; cursor: pointer;
      font-size: 1.1rem; line-height: 1; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .close-btn:hover { color: var(--danger); border-color: var(--danger); background: rgba(224,92,92,0.08); }
    .detail-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    .ai-box { background: linear-gradient(135deg, #1a1830, #1a1424); border: 1px solid #3a3050; border-radius: 10px; padding: 16px; }
    .ai-box-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .ai-box p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .keywords-box { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .keyword-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-size: 0.75rem; color: var(--text); }

    .detail-section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
    .detail-content { font-size: 0.88rem; line-height: 1.7; color: var(--text); white-space: pre-wrap; }

    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 36px; width: 560px; max-height: 90vh; overflow-y: auto;
      zoom: 1.25;
    }
    .modal h2 { font-family: 'Playfair Display', serif; margin-bottom: 24px; color: var(--accent); font-size: 1.5rem; }
    .modal .form-group { margin-bottom: 18px; }
    .modal .form-group label { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }
    .modal input, .modal textarea {
      font-size: 1rem;
      padding: 14px 16px;
    }
    .modal-footer { display: flex; gap: 12px; margin-top: 24px; }
    .modal-footer .btn { flex: 1; padding: 14px; font-size: 1rem; }
    textarea { resize: vertical; min-height: 120px; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success); color: #000; padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; z-index: 999; animation: fadeInUp 0.3s ease; }
    .toast.error { background: var(--danger); color: #fff; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>


<div id="auth-screen">
  <div class="auth-box">
    <h1>📝 NoteAI</h1>
    <p>Yapay zeka destekli not alma sistemi</p>
    <div class="auth-tabs">
      <button class="active" onclick="switchTab('login')">Giriş Yap</button>
      <button onclick="switchTab('register')">Kayıt Ol</button>
    </div>

    
    <div id="login-form">
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="login-username" placeholder="kullanıcı_adi"/>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary" onclick="login()">Giriş Yap</button>
      <div id="login-error" class="error-msg"></div>
    </div>

    
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="reg-username" placeholder="kullanıcı_adi"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="ornek@email.com"/>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="reg-password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary" onclick="register()">Kayıt Ol</button>
      <div id="reg-error" class="error-msg"></div>
    </div>
  </div>
</div>


<div id="app-screen">
  <header>
    <h1>📝 NoteAI</h1>
    <div class="header-right">
      <span class="user-badge" id="user-display">@kullanici</span>
      <button class="btn-logout" onclick="logout()">Çıkış</button>
    </div>
  </header>

  <div class="app-body">
    
    <aside>
      <button class="add-note-btn" onclick="openCreateModal()">+ Yeni Not</button>
      <div class="sidebar-label">Filtrele</div>
      <div class="sidebar-item active" onclick="filterNotes('all', this)" id="filter-all">
        <span class="icon">📋</span> Tüm Notlar
      </div>
      <div class="sidebar-label">Klasörler</div>
      <div id="folder-list"></div>
    </aside>

    
    <div class="notes-panel">
      <div class="notes-toolbar">
        <input class="search-input" id="search-input" placeholder="🔍  Notlarda ara..." oninput="searchNotes()" />
      </div>
      <div class="notes-list" id="notes-list">
        <div class="empty-state">
          <div class="big-icon">📝</div>
          <p>Henüz not yok</p>
          <p style="font-size:0.8rem">İlk notunu oluştur!</p>
        </div>
      </div>
    </div>

    
    <div class="note-detail" id="note-detail" style="display:none">
      <div class="detail-header">
        <h3 id="detail-title">Not Detayı</h3>
        <div class="detail-actions">
          <button class="icon-btn" onclick="openEditModal()" title="Düzenle">✏️</button>
          <button class="icon-btn" onclick="deleteCurrentNote()" title="Sil" style="color:var(--danger)">🗑️</button>
          <button class="close-btn" onclick="closeNoteDetail()" title="Kapat">✕</button>
        </div>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>
  </div>
</div>


<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2 id="modal-title">Yeni Not</h2>
    <div class="form-group">
      <label>Başlık</label>
      <input type="text" id="note-title" placeholder="Notun başlığı..."/>
    </div>
    <div class="form-group">
      <label>İçerik</label>
      <textarea id="note-content" rows="6" placeholder="Notun içeriği..."></textarea>
    </div>
    <div class="form-group">
      <label>Klasör</label>
      <input type="text" id="note-folder" placeholder="Genel" value="Genel"/>
    </div>
    <div class="form-group">
      <label>Etiketler (virgülle ayır)</label>
      <input type="text" id="note-tags" placeholder="python, makine öğrenmesi, ders"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveNote()">Kaydet</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';
  let token = localStorage.getItem('token');
  let currentUser = null;
  let notes = [];
  let selectedNoteId = null;
  let editingNoteId = null;
  let currentFilter = 'all';
  let currentSearch = '';

  
  window.onload = () => {
    if (token) showApp();
  };

  
  function switchTab(tab) {
    document.querySelectorAll('.auth-tabs button').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function login() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    try {
      const form = new FormData();
      form.append('username', username);
      form.append('password', password);
      const res = await fetch(`${API}/auth/login`, { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      token = data.access_token;
      localStorage.setItem('token', token);
      showApp();
    } catch (e) {
      document.getElementById('login-error').textContent = e.message;
    }
  }

  async function register() {
    const username = document.getElementById('reg-username').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    document.getElementById('reg-error').textContent = '';
    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail);
      showToast('Kayıt başarılı! Giriş yapabilirsiniz.');
      switchTab('login');
    } catch (e) {
      document.getElementById('reg-error').textContent = e.message;
    }
  }

  function logout() {
    token = null;
    localStorage.removeItem('token');
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-screen').style.display = 'flex';
  }

  async function showApp() {
    try {
      const res = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { logout(); return; }
      currentUser = await res.json();
      document.getElementById('user-display').textContent = '@' + currentUser.username;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      loadNotes();
    } catch { logout(); }
  }

  
  function authHeaders() {
    return { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` };
  }

  
  async function loadNotes() {
    let url = `${API}/notes/`;
    const params = new URLSearchParams();
    if (currentSearch) params.append('search', currentSearch);
    if (currentFilter !== 'all' && currentFilter.startsWith('folder:')) {
      params.append('folder', currentFilter.replace('folder:', ''));
    }
    if (params.toString()) url += '?' + params.toString();

    const res = await fetch(url, { headers: authHeaders() });
    notes = await res.json();
    renderNotes();
    loadFolders();
  }

  function renderNotes() {
    const container = document.getElementById('notes-list');
    if (!notes.length) {
      container.innerHTML = `<div class="empty-state"><div class="big-icon">📝</div><p>Not bulunamadı</p></div>`;
      return;
    }
    container.innerHTML = notes.map(n => `
      <div class="note-card ${n.id === selectedNoteId ? 'active' : ''}" onclick="selectNote(${n.id})">
        <div class="note-card-title">${escHtml(n.title)}</div>
        <div class="note-card-preview">${escHtml(n.content.substring(0, 80))}...</div>
        <div class="note-card-meta">
          ${n.folder ? `<span class="folder-pill">${escHtml(n.folder)}</span>` : ''}
          ${n.tags.slice(0,3).map(t => `<span class="tag-pill">#${escHtml(t.name)}</span>`).join('')}
          <span class="date-text">${formatDate(n.created_at)}</span>
        </div>
      </div>
    `).join('');
  }

  async function loadFolders() {
    const res = await fetch(`${API}/notes/folders/list`, { headers: authHeaders() });
    const data = await res.json();
    const container = document.getElementById('folder-list');
    container.innerHTML = data.folders.map(f => `
      <div class="sidebar-item ${currentFilter === 'folder:'+f ? 'active' : ''}" onclick="filterNotes('folder:${f}', this)">
        <span class="icon">📁</span> ${escHtml(f)}
      </div>
    `).join('');
  }

  function selectNote(id) {
    selectedNoteId = id;
    renderNotes();
    const note = notes.find(n => n.id === id);
    if (!note) return;
    showNoteDetail(note);
  }

  function closeNoteDetail() {
    selectedNoteId = null;
    document.getElementById('note-detail').style.display = 'none';
    renderNotes();
  }

  function showNoteDetail(note) {
    const panel = document.getElementById('note-detail');
    panel.style.display = 'flex';
    document.getElementById('detail-title').textContent = note.title;

    const body = document.getElementById('detail-body');
    body.innerHTML = `
      ${note.summary ? `
        <div class="ai-box">
          <div class="ai-box-title">✨ AI Özeti</div>
          <p>${escHtml(note.summary)}</p>
        </div>` : ''}
      ${note.keywords ? `
        <div>
          <div class="detail-section-label">🔑 Anahtar Kelimeler</div>
          <div class="keywords-box">
            ${note.keywords.split(',').map(k => `<span class="keyword-pill">${escHtml(k.trim())}</span>`).join('')}
          </div>
        </div>` : ''}
      <div>
        <div class="detail-section-label">📁 Klasör</div>
        <span class="folder-pill">${escHtml(note.folder || 'Genel')}</span>
      </div>
      <div>
        <div class="detail-section-label">🏷️ Etiketler</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${note.tags.length ? note.tags.map(t => `<span class="tag-pill">#${escHtml(t.name)}</span>`).join('') : '<span style="color:var(--muted);font-size:0.82rem">Etiket yok</span>'}
        </div>
      </div>
      <div>
        <div class="detail-section-label">📄 İçerik</div>
        <div class="detail-content">${escHtml(note.content)}</div>
      </div>
      <div style="margin-top:auto">
        <button class="btn btn-ai" onclick="analyzeNote(${note.id})" id="ai-btn-${note.id}">
          ✨ AI ile Analiz Et
        </button>
      </div>
    `;
  }

  async function analyzeNote(noteId) {
    const btn = document.getElementById(`ai-btn-${noteId}`);
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span> Analiz ediliyor...';
    try {
      const res = await fetch(`${API}/ai/analyze/${noteId}`, { method: 'POST', headers: authHeaders() });
      if (!res.ok) throw new Error('AI analizi başarısız');
      showToast('✨ AI analizi tamamlandı!');
      await loadNotes();
      const updated = notes.find(n => n.id === noteId);
      if (updated) showNoteDetail(updated);
    } catch (e) {
      showToast(e.message, true);
      btn.disabled = false;
      btn.innerHTML = '✨ AI ile Analiz Et';
    }
  }

  function filterNotes(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    loadNotes();
  }

  function searchNotes() {
    currentSearch = document.getElementById('search-input').value;
    loadNotes();
  }

  
  function openCreateModal() {
    editingNoteId = null;
    document.getElementById('modal-title').textContent = 'Yeni Not';
    document.getElementById('note-title').value = '';
    document.getElementById('note-content').value = '';
    document.getElementById('note-folder').value = 'Genel';
    document.getElementById('note-tags').value = '';
    document.getElementById('modal-save-btn').textContent = 'Kaydet';
    document.getElementById('modal').style.display = 'flex';
  }

  function openEditModal() {
    const note = notes.find(n => n.id === selectedNoteId);
    if (!note) return;
    editingNoteId = note.id;
    document.getElementById('modal-title').textContent = 'Notu Düzenle';
    document.getElementById('note-title').value = note.title;
    document.getElementById('note-content').value = note.content;
    document.getElementById('note-folder').value = note.folder || 'Genel';
    document.getElementById('note-tags').value = note.tags.map(t => t.name).join(', ');
    document.getElementById('modal-save-btn').textContent = 'Güncelle';
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  function closeModalOnBg(e) {
    if (e.target.id === 'modal') closeModal();
  }

  async function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const content = document.getElementById('note-content').value.trim();
    const folder = document.getElementById('note-folder').value.trim() || 'Genel';
    const tagsRaw = document.getElementById('note-tags').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

    if (!title || !content) { showToast('Başlık ve içerik gerekli!', true); return; }

    const body = JSON.stringify({ title, content, folder, tags });
    try {
      let res;
      if (editingNoteId) {
        res = await fetch(`${API}/notes/${editingNoteId}`, { method: 'PUT', headers: authHeaders(), body });
      } else {
        res = await fetch(`${API}/notes/`, { method: 'POST', headers: authHeaders(), body });
      }
      if (!res.ok) throw new Error('İşlem başarısız');
      closeModal();
      showToast(editingNoteId ? 'Not güncellendi!' : 'Not oluşturuldu!');
      await loadNotes();
      if (editingNoteId) {
        const updated = notes.find(n => n.id === editingNoteId);
        if (updated) showNoteDetail(updated);
      }
    } catch (e) { showToast(e.message, true); }
  }

  async function deleteCurrentNote() {
    if (!selectedNoteId) return;
    if (!confirm('Bu notu silmek istediğine emin misin?')) return;
    await fetch(`${API}/notes/${selectedNoteId}`, { method: 'DELETE', headers: authHeaders() });
    selectedNoteId = null;
    document.getElementById('note-detail').style.display = 'none';
    showToast('Not silindi!');
    loadNotes();
  }

  
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(dt) {
    return new Date(dt).toLocaleDateString('tr-TR', { day:'numeric', month:'short' });
  }

  function showToast(msg, isError = false) {
    const t = document.createElement('div');
    t.className = 'toast' + (isError ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
